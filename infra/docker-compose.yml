# Local infra for EdgeOracle.
# Postgres + TimescaleDB (tick history) and Redis (cache + pub/sub).
# Redis is unused by the ingestion slice but kept here to match the project infra.
#
# Up:   docker compose -f infra/docker-compose.yml up -d
# Down: docker compose -f infra/docker-compose.yml down   (add -v to wipe data)

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_USER: edge
      POSTGRES_PASSWORD: edge
      POSTGRES_DB: edge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edge -d edge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
